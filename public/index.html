<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDX Pro Terminal | AI Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold tracking-tight">IDX PRO <span class="text-blue-500 text-sm font-mono">v3.0.0</span></h1>
            <div class="flex space-x-2">
                <input id="tickerInput" type="text" placeholder="Contoh: BBCA" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                <button onclick="analyzeStock()" id="btnAction" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-bold transition-all">ANALYZE</button>
            </div>
        </div>

        <!-- Main Dashboard -->
        <div id="resultArea" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Card 1: Price Info -->
                <div class="glass p-6 rounded-2xl glow-blue">
                    <p class="text-slate-400 text-xs mb-1 uppercase tracking-widest">Market Price</p>
                    <div class="text-3xl font-bold" id="uiPrice">Rp 0</div>
                    <div class="text-sm font-semibold mt-1" id="uiChange">+0.00%</div>
                </div>
                <!-- Card 2: Fair Value Gauge -->
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-xs mb-1 uppercase tracking-widest">AI Fair Value</p>
                    <div class="text-3xl font-bold text-emerald-400" id="uiFairValue">Rp 0</div>
                    <p class="text-xs text-slate-500 mt-1 uppercase" id="uiSignal">Signal: -</p>
                </div>
                <!-- Card 3: Volumetry -->
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-xs mb-1 uppercase tracking-widest">Volume Ratio</p>
                    <div class="text-3xl font-bold text-blue-400" id="uiVolRatio">0.0x</div>
                    <p class="text-xs text-slate-500 mt-1 uppercase" id="uiPhase">Phase: -</p>
                </div>
            </div>

            <!-- Technical Analysis Box -->
            <div class="glass p-8 rounded-2xl">
                <h3 class="text-blue-400 font-mono mb-4 flex items-center">
                    <span class="mr-2">●</span> AI STRATEGY REPORT
                </h3>
                <div id="uiSummary" class="text-slate-300 leading-relaxed text-lg"></div>
                <div class="grid grid-cols-2 gap-4 mt-8 pt-8 border-t border-slate-700">
                    <div>
                        <p class="text-slate-500 text-xs uppercase">Immediate Support</p>
                        <p class="font-bold text-xl" id="uiSupport">Rp 0</p>
                    </div>
                    <div>
                        <p class="text-slate-500 text-xs uppercase">Target Resistance</p>
                        <p class="font-bold text-xl" id="uiResistance">Rp 0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-slate-400 animate-pulse">Scanning IDX Database & Institutional Orderflows...</p>
        </div>
    </div>

    <script>
        async function analyzeStock() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase();
            if (!ticker) return alert('Masukkan Ticker!');

            const btn = document.getElementById('btnAction');
            const resultArea = document.getElementById('resultArea');
            const loading = document.getElementById('loading');

            // Toggle UI
            btn.disabled = true;
            resultArea.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker })
                });

                const data = await response.json();

                // Update UI dengan data dari Claude
                document.getElementById('uiPrice').innerText = `Rp ${data.price.toLocaleString()}`;
                document.getElementById('uiChange').innerText = `${data.change > 0 ? '▲' : '▼'} ${data.change}%`;
                document.getElementById('uiChange').className = data.change > 0 ? 'text-emerald-400' : 'text-rose-400';
                document.getElementById('uiFairValue').innerText = `Rp ${data.fair_value.toLocaleString()}`;
                document.getElementById('uiVolRatio').innerText = `${data.vol_ratio}x`;
                document.getElementById('uiSummary').innerText = data.summary;
                document.getElementById('uiSupport').innerText = `Rp ${data.support.toLocaleString()}`;
                document.getElementById('uiResistance').innerText = `Rp ${data.resistance.toLocaleString()}`;
                document.getElementById('uiSignal').innerText = `Signal: ${data.signal}`;
                document.getElementById('uiPhase').innerText = `Phase: ${data.phase}`;

                loading.classList.add('hidden');
                resultArea.classList.remove('hidden');
            } catch (err) {
                alert('Gagal mengambil data. Cek koneksi API.');
                loading.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
